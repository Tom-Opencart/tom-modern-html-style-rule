<!-- Tom Modern Design — Contact Form Template -->
<!-- Copy this block and replace content with your own -->

<section class="section section-alt">
    <div class="container contact-grid">
        <div>
            <p class="eyebrow">Contact</p>
            <h2>Get in <span class="title-highlight">touch</span></h2>
            <p>Description of what happens when they contact you. Set expectations clearly.</p>
            <ul class="plain-list">
                <li>What they'll get from contacting you</li>
                <li>Response time expectation</li>
                <li>Next steps after contact</li>
            </ul>
        </div>

        <div class="contact-card frame">
            <form novalidate>
                <div class="field-group">
                    <label>Your name *</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="field-group">
                    <label>Email *</label>
                    <input type="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="field-group">
                    <label>Phone</label>
                    <input type="tel" class="form-control" placeholder="+1 (555) 123-4567">
                </div>
                <div class="field-group">
                    <label>Message</label>
                    <textarea class="form-control form-textarea" placeholder="Tell us about your project or question"></textarea>
                </div>
                <button class="button button-primary button-block" type="submit">Send Message</button>
            </form>
        </div>
    </div>
</section>
